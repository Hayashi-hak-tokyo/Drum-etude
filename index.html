<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rudiments Drum Solo Etude - IDM & Syncopation</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- ABCJS for Music Notation & Audio -->
    <script src="https://cdn.jsdelivr.net/npm/abcjs@6.3.0/dist/abcjs-basic-min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/abcjs@6.3.0/abcjs-audio.min.css">

    <style>
        .abcjs-css-warning { display: none !important; }
        body { font-family: 'Inter', sans-serif; background-color: #f4f4f5; touch-action: manipulation; }
        #score-container svg { width: 100%; height: auto; display: block; }
        .abcjs-inline-audio { max-width: 100%; padding: 10px; border-radius: 8px; }

        /* --- 修正: 楽譜内の不要な記号のみを非表示にし、プレイヤーのUIを保護 --- */
        #score-container svg .abcjs-decoration, 
        #score-container svg .abcjs-dynamics, 
        #score-container svg .abcjs-annotation {
            display: none !important;
        }
        
        /* アクセント記号(articulation)を赤くする */
        .abcjs-articulation {
            fill: #ef4444 !important;
            stroke: #ef4444 !important;
        }

        /* --- オーディオプレイヤーの視認性向上 --- */
        .abcjs-inline-audio .abcjs-tempo-wrapper,
        .abcjs-inline-audio .abcjs-midi-tempo,
        .abcjs-inline-audio .abcjs-label {
            color: #18181b !important; /* 濃いグレー(zinc-900)で確実に見えるように */
            font-weight: 600 !important;
            display: inline-block !important; /* 非表示を解除 */
        }
        
        button { user-select: none; -webkit-tap-highlight-color: transparent; }

        /* 印刷/PDF用設定 */
        @media print {
            body { background-color: white; padding: 0; margin: 0; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .printable-area { 
                box-shadow: none !important; border: none !important; 
                width: 100% !important; max-width: none !important;
                margin: 0 !important; padding: 0 !important;
            }
            #score-container svg { width: 100% !important; }
        }
    </style>
</head>
<body class="p-2 md:p-8 text-zinc-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- MOTIF LIBRARY ---
        const MOTIF_LIBRARY = {
            straight: {
                rest: {
                    basic: [[["z2", "", ""]]],
                    advanced: [
                        [["[!style=x!fF]", "R+K", "A"], ["c", "r", "G", "/"], ["c", "l", "G", "/"]], 
                        [["[!style=x!fF]", "R+K", "A"], ["e", "r", "G", "/"], ["e", "l", "G", "/"]], 
                        [["[!style=x!fF]", "R+K", "A"], ["A", "r", "G", "/"], ["A", "l", "G", "/"]], 
                        [["[!style=x!fF]", "R+K", "A"], ["c", "r", "G", "/"], ["e", "l", "G", "/"]], 
                        [["[!style=x!fF]", "R+K", "A"], ["e", "r", "G", "/"], ["A", "l", "G", "/"]]  
                    ],
                    extreme: [[["z2", "", ""]]]
                },
                glitch_fill: {
                    extreme: [
                        [["c", "r", "G"], ["F", "K", "K"], ["F", "K", "K"], ["c", "l", "G"]], 
                        [["F", "K", "K"], ["c", "r", "G"], ["c", "l", "G"], ["F", "K", "K"]], 
                        [["c", "r", "G", "//"], ["c", "r", "G", "//"], ["c", "l", "G", "//"], ["c", "l", "G", "//"], ["F", "K", "K", "/"], ["F", "K", "K", "/"]]
                    ]
                },
                glitch_triplet: {
                    extreme: [
                        [["c", "r", "G"], ["c", "l", "G"], ["F", "K", "K"]], 
                        [["F", "K", "K"], ["c", "r", "G"], ["c", "l", "G"]]
                    ]
                },
                acc_1: {
                    basic: [[["c", "R", "A"], ["c", "L", "G"], ["c", "R", "G"], ["c", "L", "G"]]],
                    advanced: [
                        [["c", "R", "A"], ["c", "L", "G"], ["c", "R", "G"], ["c", "L", "G"]],
                        [["e", "R", "A"], ["c", "L", "G"], ["c", "R", "G"], ["c", "L", "G"]],
                        [["c", "R", "A"], ["A", "l", "G"], ["A", "r", "G"], ["c", "L", "G"]]
                    ],
                    extreme: [
                        [["c", "R", "A"], ["c", "L", "G"], ["F", "K", "K"], ["F", "K", "K"]], 
                        [["c", "R", "A"], ["c", "r", "G", "//"], ["c", "r", "G", "//"], ["c", "l", "G", "//"], ["c", "l", "G", "//"], ["F", "K", "K", "/"]]
                    ]
                },
                acc_2: {
                    basic: [[["c", "R", "G"], ["c", "L", "A"], ["c", "R", "G"], ["c", "L", "G"]]],
                    advanced: [
                        [["c", "R", "G"], ["c", "L", "A"], ["c", "R", "G"], ["c", "L", "G"]],
                        [["A", "r", "G"], ["c", "L", "A"], ["c", "R", "G"], ["A", "l", "G"]],
                        [["e", "R", "G"], ["c", "L", "A"], ["A", "r", "G"], ["c", "L", "G"]]
                    ],
                    extreme: [
                        [["F", "K", "K"], ["c", "L", "A"], ["c", "R", "G"], ["c", "R", "G"]], 
                        [["F", "K", "K"], ["c", "L", "A"], ["c", "r", "G", "//"], ["c", "r", "G", "//"], ["c", "l", "G", "//"], ["c", "l", "G", "//"]]
                    ]
                },
                acc_3: {
                    basic: [[["c", "R", "G"], ["c", "L", "G"], ["c", "R", "A"], ["c", "L", "G"]]],
                    advanced: [
                        [["c", "R", "G"], ["c", "L", "G"], ["c", "R", "A"], ["c", "L", "G"]],
                        [["A", "r", "G"], ["A", "l", "G"], ["e", "R", "A"], ["c", "L", "G"]],
                        [["c", "R", "G"], ["A", "l", "G"], ["c", "R", "A"], ["A", "l", "G"]]
                    ],
                    extreme: [
                        [["c", "r", "G", "//"], ["c", "r", "G", "//"], ["c", "l", "G", "//"], ["c", "l", "G", "//"], ["c", "R", "A"], ["c", "L", "G"]],
                        [["F", "K", "K"], ["c", "R", "A"], ["c", "l", "G", "//"], ["c", "l", "G", "//"], ["c", "r", "G", "//"], ["c", "r", "G", "//"]]
                    ]
                },
                acc_4: {
                    basic: [[["c", "R", "G"], ["c", "L", "G"], ["c", "R", "G"], ["c", "L", "A"]]],
                    advanced: [
                        [["c", "R", "G"], ["c", "L", "G"], ["c", "R", "G"], ["c", "L", "A"]],
                        [["A", "r", "G"], ["c", "L", "G"], ["A", "r", "G"], ["e", "L", "A"]],
                        [["c", "R", "G"], ["A", "l", "G"], ["c", "R", "G"], ["c", "L", "A"]]
                    ],
                    extreme: [
                        [["c", "r", "G", "//"], ["c", "r", "G", "//"], ["c", "l", "G", "//"], ["c", "l", "G", "//"], ["F", "K", "K"], ["c", "L", "A"]], 
                        [["c", "r", "G"], ["F", "K", "K"], ["c", "L", "A"]] 
                    ]
                }
            },
            swing: {
                rest: { 
                    basic: [[["z2", "", ""]]], 
                    advanced: [
                        [["[!style=x!fF]", "R+K", "A"], ["z", "", ""], ["c", "l", "G"]],
                        [["[!style=x!fF]", "R+K", "A"], ["z", "", ""], ["e", "l", "G"]],
                        [["[!style=x!fF]", "R+K", "A"], ["z", "", ""], ["A", "l", "G"]]
                    ] 
                },
                acc_1: {
                    basic: [[["c", "R", "A"], ["c", "L", "G"], ["c", "R", "G"]]],
                    advanced: [
                        [["c", "R", "A"], ["A", "l", "G"], ["c", "R", "G"]],
                        [["e", "R", "A"], ["c", "L", "G"], ["A", "r", "G"]]
                    ]
                },
                acc_2: {
                    basic: [[["c", "L", "G"], ["c", "R", "A"], ["c", "L", "G"]]],
                    advanced: [
                        [["A", "l", "G"], ["c", "R", "A"], ["c", "L", "G"]],
                        [["c", "L", "G"], ["e", "R", "A"], ["A", "l", "G"]]
                    ]
                },
                acc_3: {
                    basic: [[["c", "R", "G"], ["c", "L", "G"], ["c", "R", "A"]]],
                    advanced: [
                        [["c", "R", "G"], ["A", "l", "G"], ["c", "R", "A"]],
                        [["A", "r", "G"], ["c", "L", "G"], ["e", "R", "A"]]
                    ]
                },
                acc_4: {
                    basic: [[["c", "L", "G"], ["c", "R", "G"], ["c", "L", "A"]]],
                    advanced: [
                        [["c", "L", "G"], ["A", "R", "G"], ["c", "L", "A"]],
                        [["A", "l", "G"], ["c", "R", "G"], ["e", "L", "A"]]
                    ]
                }
            }
        };

        // --- 手順・強弱・オーケストレーションガード ---
        function applyStickingGuard(fullPhrase) {
            let lastHand = "";
            let lastActualPitch = ""; 
            let handCount = 0;
            let kickCount = 0;

            for (let i = 0; i < fullPhrase.length; i++) {
                let hit = fullPhrase[i];
                if (!hit || hit[0].includes("z")) continue; 

                let sticking = hit[1] || "";
                let hasKick = sticking.includes("K");
                let hand = "";
                if (sticking.toUpperCase().includes("R")) hand = "R";
                else if (sticking.toUpperCase().includes("L")) hand = "L";

                if (hand !== "") {
                    if (hand === lastHand) {
                        hit[2] = 'G'; 
                        let targetPitch = lastActualPitch;
                        if (!targetPitch.includes("style=x")) {
                            if (!hit[0].includes("z")) hit[0] = targetPitch;
                        }
                        
                        handCount++;
                        if (handCount > 2) {
                            let newBase = (hand === "R") ? "L" : "R";
                            hit[1] = hit[1].replace(/[RrLl]/g, newBase.toLowerCase());
                            lastHand = newBase;
                            handCount = 1;
                        }
                    } else {
                        handCount = 1;
                        lastHand = hand;
                    }
                } else if (sticking === "K" || sticking === "") {
                    handCount = 0;
                    lastHand = "";
                }

                if (!hit[0].includes("z")) {
                    lastActualPitch = hit[0];
                }

                if (hasKick) {
                    kickCount++;
                    if (kickCount > 2) {
                        let updatedSticking = sticking.replace("+K", "").replace("K", "");
                        if (hit[0].includes("F") || hit[0].includes("f")) {
                            hit[0] = "c"; 
                            let nextHand = (lastHand === "R") ? "l" : "r";
                            hit[1] = nextHand;
                            hit[2] = 'G';
                            lastHand = nextHand.toUpperCase();
                            handCount = 1;
                        } else {
                            hit[1] = updatedSticking;
                        }
                        kickCount = 0; 
                    }
                } else {
                    kickCount = 0;
                }
            }
            return fullPhrase;
        }

        function slotToNotesAndWords(slot, feel) {
            let notes = "";
            let wordsArr = [];
            
            const processNote = (s, force16th = false) => {
                let [note, sticking, dyn, duration] = s;
                if (note.includes("z")) {
                    wordsArr.push("_");
                    return note + (duration || (force16th ? "/" : ""));
                }
                
                let velocity = (dyn === 'A') ? "!ff!" : "!ppp!";
                let prefix = (dyn === 'A') ? "!>!" + velocity : velocity;
                
                let displaySticking = sticking;
                if (dyn !== 'A' && displaySticking) {
                    displaySticking = displaySticking.toLowerCase().replace("+k", "").replace("k", ""); 
                } else if (displaySticking) {
                    displaySticking = displaySticking.toUpperCase();
                }

                wordsArr.push(displaySticking || "_");
                let suffix = duration || (force16th ? "/" : "");
                return prefix + note + suffix;
            };
            
            if (slot.length === 1) {
                notes = processNote(slot[0]);
            } else if (feel === 'swing') {
                notes = "(3" + slot.map(s => processNote(s)).join("");
            } else {
                notes = slot.map(s => processNote(s, slot.length === 4)).join("");
            }
            return { notes, words: wordsArr.join(" ") };
        }

        function skeletonToAbc(skeleton, difficulty, feel, isTradeMode) {
            if (!skeleton) return "";
            const generateSystem = (bars) => {
                let flatPhrase = [];
                bars.forEach((barSkeleton, barIdx) => {
                    barSkeleton.forEach((beatSkeleton, beatIdx) => {
                        const { key, isCrash, variationIndex } = beatSkeleton;
                        const feelConfig = MOTIF_LIBRARY[feel];
                        let keyToUse = key;
                        if (difficulty === 'extreme' && feel === 'straight' && key === 'rest') {
                            if (variationIndex % 100 < 25) keyToUse = 'glitch_triplet';
                            else keyToUse = 'glitch_fill';
                        }
                        const keyConfig = feelConfig[keyToUse] || feelConfig['rest'];
                        let targetDiff = (feel === 'swing' && difficulty === 'extreme') ? 'advanced' : difficulty;
                        const motifOptions = keyConfig[targetDiff] || keyConfig['basic'];
                        let motifDef = motifOptions[variationIndex % motifOptions.length];
                        let motif = JSON.parse(JSON.stringify(motifDef));
                        if (difficulty === 'basic') {
                            motif.forEach(step => {
                                if (!step[0].includes("z")) {
                                    step[0] = "c";
                                    if (step[1]) {
                                        step[1] = step[1].replace(/\+K/g, "").replace(/K/g, "").replace(/k/g, "");
                                        if (step[1] === "") step[1] = (step[2] === 'A' ? "R" : "r");
                                    }
                                }
                            });
                        }
                        if (difficulty !== 'basic' && isCrash) {
                            for (let i = 0; i < motif.length; i++) {
                                if (motif[i][2] === 'A') {
                                    motif[i][0] = "[!style=x!fF]";
                                    motif[i][1] = (motif[i][1] || "R").replace(/\+K/g, "").replace(/K/g, "").replace(/k/g, "") + "+K";
                                    break;
                                }
                            }
                        }
                        flatPhrase.push({ motif, isBarEnd: (beatIdx === 3) });
                    });
                });
                let allSteps = [];
                flatPhrase.forEach(m => allSteps.push(...m.motif));
                applyStickingGuard(allSteps);
                let notesStr = "";
                let wordsStr = "w: ";
                let stepIdx = 0;
                flatPhrase.forEach(m => {
                    let motifToProcess = [];
                    for(let i=0; i<m.motif.length; i++) motifToProcess.push(allSteps[stepIdx++]);
                    let { notes, words } = slotToNotesAndWords(motifToProcess, feel);
                    notesStr += notes + " ";
                    if (words) wordsStr += words + " ";
                    if (m.isBarEnd) { notesStr += "| "; wordsStr += "| "; }
                });
                return notesStr + "\n" + wordsStr + "\n";
            };
            let finalAbc = generateSystem(skeleton);
            if (isTradeMode) {
                finalAbc += "z2 z2 z2 z2 | z2 z2 z2 z2 | z2 z2 z2 z2 | z2 z2 z2 z2 |] \n";
                finalAbc += "w: | | | | \n";
            } else {
                finalAbc = finalAbc.trim().slice(0, -1) + "] \n";
            }
            return finalAbc;
        }

        const App = () => {
            const [difficulty, setDifficulty] = useState('basic');
            const [feel, setFeel] = useState('straight');
            const [isTradeMode, setIsTradeMode] = useState(false);
            const [skeleton, setSkeleton] = useState(null);
            const [abcString, setAbcString] = useState("");
            const [visualObj, setVisualObj] = useState(null);
            const scoreRef = useRef(null);
            const audioContainerRef = useRef(null);

            const unlockAudio = async () => {
                const context = ABCJS.synth.activeAudioContext();
                if (context && context.state === 'suspended') await context.resume();
            };

            useEffect(() => {
                generateNewSkeleton();
                if (feel === 'swing' && difficulty === 'extreme') setDifficulty('advanced');
            }, [feel]);

            const generateNewSkeleton = () => {
                unlockAudio();
                const accentKeys = Object.keys(MOTIF_LIBRARY[feel]).filter(k => k.startsWith('acc'));
                let newSkeleton = [];
                let prevWasRest = false;
                for (let bar = 0; bar < 4; bar++) {
                    let barSkeleton = [];
                    for (let beat = 0; beat < 4; beat++) {
                        let key = "";
                        if (prevWasRest) {
                            key = accentKeys[Math.floor(Math.random() * accentKeys.length)];
                            prevWasRest = false;
                        } else {
                            if (Math.random() < 0.3) {
                                key = 'rest';
                                prevWasRest = true;
                            } else {
                                key = accentKeys[Math.floor(Math.random() * accentKeys.length)];
                                prevWasRest = false;
                            }
                        }
                        let isCrash = (beat === 0 && key !== 'rest') ? (bar === 0 ? 0.8 : 0.4) : 0;
                        barSkeleton.push({ key, isCrash: Math.random() < isCrash, variationIndex: Math.floor(Math.random() * 100) });
                    }
                    newSkeleton.push(barSkeleton);
                }
                setSkeleton(newSkeleton);
            };

            useEffect(() => {
                if (skeleton) {
                    const body = skeletonToAbc(skeleton, difficulty, feel, isTradeMode);
                    if (body) {
                        setAbcString(`X:1\nT:D.R.O.P. Solo Etude\nM:4/4\nL:1/8\nQ:1/4=90\nK:perc\n%%MIDI channel 10\n%%MIDI drummap f 49\n%%MIDI drummap e 45\n%%MIDI drummap c 38\n%%MIDI drummap A 43\n%%MIDI drummap F 36\n%%articulation u\n%%stretchlast 1\n%%vocalfont sans-serif 16\n%%stafflines 5\n` + body);
                    }
                }
            }, [skeleton, difficulty, feel, isTradeMode]);

            useEffect(() => {
                if (abcString && scoreRef.current) {
                    const rendered = ABCJS.renderAbc(scoreRef.current, abcString, { responsive: 'resize', add_classes: true, staffwidth: 900, scale: 1.3, paddingtop: 15, paddingbottom: 40 });
                    setVisualObj(rendered[0]);
                }
            }, [abcString]);

            useEffect(() => {
                if (visualObj && ABCJS.synth.supportsAudio() && audioContainerRef.current) {
                    audioContainerRef.current.innerHTML = "";
                    const controller = new ABCJS.synth.SynthController();
                    controller.load(audioContainerRef.current, null, { displayLoop: true, displayRestart: true, displayPlay: true, displayProgress: true, displayWarp: true });
                    controller.disable(true);
                    new ABCJS.synth.CreateSynth().init({ visualObj: visualObj }).then(() => {
                        controller.setTune(visualObj, false, { chordsOff: true, midiChannel: 10 });
                    }).catch(console.error);
                }
            }, [visualObj]);

            const exportToPDF = () => { window.print(); };

            return (
                <div className="max-w-4xl mx-auto bg-white rounded-xl shadow-lg p-3 md:p-6 mt-2 md:mt-4 printable-area">
                    <div className="flex justify-between items-center mb-4 md:mb-6">
                        <h1 className="text-xl md:text-3xl font-bold text-zinc-800">D.R.O.P. Solo Etude</h1>
                        <button onClick={exportToPDF} className="no-print bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-1.5 px-3 md:py-2 md:px-4 rounded-md shadow-sm transition-colors text-xs md:text-sm flex items-center gap-2">
                            <span>📄 PDF保存 / 印刷</span>
                        </button>
                    </div>
                    <div className="no-print flex flex-col gap-4 mb-6 bg-zinc-50 p-3 md:p-4 rounded-lg border border-zinc-200">
                        <div className="flex flex-wrap justify-center gap-3">
                            <div className="flex bg-white rounded-md border border-zinc-300 overflow-hidden shadow-sm">
                                <button onClick={() => { unlockAudio(); setFeel('straight'); }} className={`px-4 py-2 text-sm font-medium transition-colors ${feel === 'straight' ? 'bg-indigo-600 text-white' : 'hover:bg-zinc-100 text-zinc-700'}`}>Straight</button>
                                <button onClick={() => { unlockAudio(); setFeel('swing'); }} className={`px-4 py-2 text-sm font-medium transition-colors ${feel === 'swing' ? 'bg-indigo-600 text-white' : 'hover:bg-zinc-100 text-zinc-700'}`}>Swing</button>
                            </div>
                            <div className="flex bg-white rounded-md border border-zinc-300 overflow-hidden shadow-sm">
                                <button onClick={() => { unlockAudio(); setDifficulty('basic'); }} className={`px-3 md:px-4 py-2 text-xs md:text-sm font-medium transition-colors ${difficulty === 'basic' ? 'bg-indigo-600 text-white' : 'hover:bg-zinc-100 text-zinc-700'}`}>1. Basic</button>
                                <button onClick={() => { unlockAudio(); setDifficulty('advanced'); }} className={`px-3 md:px-4 py-2 text-xs md:text-sm font-medium transition-colors ${difficulty === 'advanced' ? 'bg-indigo-600 text-white' : 'hover:bg-zinc-100 text-zinc-700'}`}>2. Orchestration</button>
                                {feel === 'straight' && <button onClick={() => { unlockAudio(); setDifficulty('extreme'); }} className={`px-3 md:px-4 py-2 text-xs md:text-sm font-medium transition-colors ${difficulty === 'extreme' ? 'bg-indigo-600 text-white' : 'hover:bg-zinc-100 text-zinc-700'}`}>3. Extreme (Glitch)</button>}
                            </div>
                        </div>
                        <div className="flex flex-wrap justify-center gap-3 items-center">
                            <label className="flex items-center space-x-2 cursor-pointer bg-white px-4 py-2 rounded-md border border-zinc-300 shadow-sm hover:bg-zinc-50 transition-colors">
                                <input type="checkbox" checked={isTradeMode} onChange={(e) => setIsTradeMode(e.target.checked)} className="w-4 h-4 text-indigo-600 rounded focus:ring-indigo-500" />
                                <span className="text-xs md:text-sm font-medium text-zinc-700">🎧 4-Bar Trade</span>
                            </label>
                            <button onClick={generateNewSkeleton} className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-6 rounded-md shadow-sm transition-colors text-sm">🔄 New Phrasing</button>
                        </div>
                    </div>
                    <div className="bg-white border-2 border-zinc-100 rounded-lg p-2 md:p-4 overflow-x-auto min-h-[150px]">
                        <div id="score-container" ref={scoreRef}></div>
                    </div>
                    <div className="no-print mt-4 bg-slate-200 border border-slate-300 rounded-lg p-2 w-full max-w-2xl mx-auto shadow-inner">
                        <div ref={audioContainerRef} className="w-full"></div>
                    </div>
                    <div className="no-print mt-6 grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div className="bg-zinc-50 border border-zinc-200 rounded-lg p-4">
                            <h3 className="font-bold text-zinc-800 mb-2 border-b border-indigo-200 pb-1 text-sm">🥁 手順の読み方</h3>
                            <ul className="text-xs text-zinc-600 space-y-1 font-mono bg-white p-2 rounded border border-zinc-100 shadow-inner">
                                <li><strong>R / L / K :</strong> アクセント (強)</li>
