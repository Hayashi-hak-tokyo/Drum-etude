<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rudiments Drum Solo Etude - IDM & Syncopation</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- ABCJS for Music Notation & Audio -->
    <script src="https://cdn.jsdelivr.net/npm/abcjs@6.3.0/dist/abcjs-basic-min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/abcjs@6.3.0/abcjs-audio.min.css">

    <style>
        .abcjs-css-warning { display: none !important; }
        body { font-family: 'Inter', sans-serif; background-color: #f4f4f5; touch-action: manipulation; }
        #score-container svg { width: 100%; height: auto; display: block; }
        .abcjs-inline-audio { max-width: 100%; padding: 10px; border-radius: 8px; }

        /* 楽譜上の記号を非表示にし、Stickingテキストを見やすくする */
        .abcjs-decoration, .abcjs-articulation, .abcjs-dynamics {
            display: none !important;
        }
        
        button { user-select: none; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="p-2 md:p-8 text-zinc-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- MOTIF LIBRARY ---
        const MOTIF_LIBRARY = {
            straight: {
                rest: {
                    basic: [[["z2", "", ""]]],
                    advanced: [[["z2", "", ""]]],
                    extreme: [[["z2", "", ""]]]
                },
                glitch_fill: {
                    extreme: [
                        [["c", "r", "G"], ["F", "K", "K"], ["F", "K", "K"], ["c", "l", "G"]], 
                        [["F", "K", "K"], ["c", "r", "G"], ["c", "l", "G"], ["F", "K", "K"]], 
                        [["c", "r", "G"], ["c", "l", "G"], ["F", "K", "K"], ["F", "K", "K"]], 
                        [["c", "r", "G"], ["F", "K", "K"], ["c", "l", "G"], ["F", "K", "K"]]  
                    ]
                },
                glitch_lead: {
                    extreme: [
                        [["c", "r", "G", "//"], ["c", "r", "G", "//"], ["c", "l", "G", "//"], ["c", "l", "G", "//"], ["F", "K", "K", "/"], ["F", "K", "K", "/"]], 
                        [["F", "K", "K", "/"], ["F", "K", "K", "/"], ["c", "r", "G", "//"], ["c", "r", "G", "//"], ["c", "l", "G", "//"], ["c", "l", "G", "//"]], 
                        [["c", "r", "G", "//"], ["c", "r", "G", "//"], ["c", "l", "G", "//"], ["c", "l", "G", "//"], ["c", "r", "G", "/"], ["c", "l", "G", "/"]]  
                    ]
                },
                glitch_triplet: {
                    extreme: [
                        [["c", "r", "G"], ["F", "K", "K"], ["F", "K", "K"]], 
                        [["F", "K", "K"], ["c", "r", "G"], ["c", "l", "G"]]  
                    ]
                },
                acc_1: {
                    basic: [[["c", "R", "A"], ["c", "L", "G"], ["c", "R", "G"], ["c", "L", "G"]]],
                    advanced: [
                        [["c", "R", "A"], ["c", "L", "G"], ["c", "R", "G"], ["c", "L", "G"]],
                        [["e", "R", "A"], ["c", "L", "G"], ["c", "R", "G"], ["c", "L", "G"]],
                        [["A", "R", "A"], ["c", "L", "G"], ["e", "R", "G"], ["c", "L", "G"]]
                    ],
                    extreme: [
                        [["c", "R", "A"], ["c", "L", "G"], ["F", "K", "K"], ["F", "K", "K"]], 
                        [["c", "R", "A"], ["c", "R", "G"], ["c", "L", "G"], ["c", "L", "G"], ["F", "K", "K"], ["F", "K", "K"]],
                        [["c", "R", "A"], ["F", "K", "K"]], 
                        [["c", "R", "A", "/"], ["c", "r", "G", "//"], ["c", "r", "G", "//"], ["c", "l", "G", "//"], ["c", "l", "G", "//"], ["F", "K", "K", "/"]]
                    ]
                },
                acc_2: {
                    basic: [[["c", "R", "G"], ["c", "L", "A"], ["c", "R", "G"], ["c", "L", "G"]]],
                    advanced: [
                        [["c", "R", "G"], ["c", "L", "A"], ["c", "R", "G"], ["c", "L", "G"]],
                        [["c", "R", "G"], ["A", "L", "A"], ["c", "R", "G"], ["c", "L", "G"]],
                        [["e", "R", "G"], ["A", "L", "A"], ["e", "R", "G"], ["c", "L", "G"]]
                    ],
                    extreme: [
                        [["F", "K", "K"], ["c", "L", "A"], ["c", "R", "G"], ["c", "R", "G"]], 
                        [["F", "K", "K"], ["e", "L", "A"], ["c", "R", "G"], ["A", "L", "G"], ["c", "R", "G"], ["e", "L", "G"]],
                        [["F", "K", "K", "/"], ["c", "L", "A", "/"], ["c", "r", "G", "//"], ["c", "r", "G", "//"], ["c", "l", "G", "//"], ["c", "l", "G", "//"]]
                    ]
                },
                acc_3: {
                    basic: [[["c", "R", "G"], ["c", "L", "G"], ["c", "R", "A"], ["c", "L", "G"]]],
                    advanced: [
                        [["c", "R", "G"], ["c", "L", "G"], ["c", "R", "A"], ["c", "L", "G"]],
                        [["c", "R", "G"], ["c", "L", "G"], ["e", "R", "A"], ["c", "L", "G"]],
                        [["A", "R", "G"], ["e", "L", "G"], ["A", "R", "A"], ["c", "L", "G"]]
                    ],
                    extreme: [
                        [["c", "R", "G"], ["c", "L", "G"], ["c", "R", "A"], ["c", "L", "G"], ["F", "K", "K"], ["F", "K", "K"]],
                        [["e", "R", "G"], ["c", "L", "G"], ["F", "K", "K"], ["A", "R", "A"], ["F", "K", "K"], ["c", "L", "G"]],
                        [["c", "r", "G", "//"], ["c", "r", "G", "//"], ["e", "l", "G", "/"], ["A", "R", "A", "/"], ["F", "K", "K", "/"]]
                    ]
                },
                acc_4: {
                    basic: [[["c", "R", "G"], ["c", "L", "G"], ["c", "R", "G"], ["c", "L", "A"]]],
                    advanced: [
                        [["c", "R", "G"], ["c", "L", "G"], ["c", "R", "G"], ["c", "L", "A"]],
                        [["c", "R", "G"], ["c", "L", "G"], ["c", "R", "G"], ["A", "L", "A"]],
                        [["e", "R", "G"], ["c", "L", "G"], ["A", "R", "G"], ["e", "L", "A"]]
                    ],
                    extreme: [
                        [["c", "R", "G"], ["c", "R", "G"], ["A", "L", "G"], ["A", "L", "G"], ["F", "K", "K"], ["c", "L", "A"]], 
                        [["F", "K", "K"], ["F", "K", "K"], ["e", "R", "G"], ["A", "L", "A"]]
                    ]
                }
            },
            swing: {
                rest: { basic: [[["z2", "", ""]]], advanced: [[["z2", "", ""]]] },
                acc_1: {
                    basic: [[["c", "R", "A"], ["c", "L", "G"], ["c", "R", "G"]]],
                    advanced: [
                        [["c", "R", "A"], ["c", "L", "G"], ["c", "R", "G"]],
                        [["e", "R", "A"], ["c", "L", "G"], ["c", "R", "G"]],
                        [["A", "R", "A"], ["e", "L", "G"], ["c", "R", "G"]]
                    ]
                },
                acc_2: {
                    basic: [[["c", "L", "G"], ["c", "R", "A"], ["c", "L", "G"]]],
                    advanced: [
                        [["c", "L", "G"], ["c", "R", "A"], ["c", "L", "G"]],
                        [["c", "L", "G"], ["A", "R", "A"], ["c", "L", "G"]],
                        [["e", "L", "G"], ["A", "R", "A"], ["e", "L", "G"]]
                    ]
                },
                acc_3: {
                    basic: [[["c", "R", "G"], ["c", "L", "G"], ["c", "R", "A"]]],
                    advanced: [
                        [["c", "R", "G"], ["c", "L", "G"], ["c", "R", "A"]],
                        [["c", "R", "G"], ["c", "L", "G"], ["e", "R", "A"]],
                        [["e", "R", "G"], ["A", "L", "G"], ["A", "R", "A"]]
                    ]
                },
                acc_4: {
                    basic: [[["c", "L", "G"], ["c", "R", "G"], ["c", "L", "A"]]],
                    advanced: [
                        [["c", "L", "G"], ["c", "R", "G"], ["c", "L", "A"]],
                        [["c", "L", "G"], ["c", "R", "G"], ["A", "L", "A"]],
                        [["A", "L", "G"], ["c", "R", "G"], ["e", "L", "A"]]
                    ]
                }
            }
        };

        // --- 手順と足の連打を防止するコアロジック ---
        function applyStickingGuard(fullPhrase) {
            let lastHand = "";
            let handCount = 0;
            let kickCount = 0;

            for (let i = 0; i < fullPhrase.length; i++) {
                let sticking = fullPhrase[i][1] || "";
                let hasKick = sticking.includes("K");
                let hand = "";
                if (sticking.toUpperCase().includes("R")) hand = "R";
                else if (sticking.toUpperCase().includes("L")) hand = "L";

                // --- Hand Guard (手) ---
                if (hand !== "") {
                    if (hand === lastHand) {
                        handCount++;
                    } else {
                        handCount = 1;
                        lastHand = hand;
                    }
                    if (handCount > 2) {
                        // 3連打目を反転
                        let newBase = (hand === "R") ? "L" : "R";
                        // ゴーストかアクセントか判定（大文字小文字）
                        let isGhost = (sticking.charAt(0) === sticking.charAt(0).toLowerCase() && !sticking.includes("+"));
                        let updated = sticking.replace(/[RrLl]/g, isGhost ? newBase.toLowerCase() : newBase);
                        fullPhrase[i][1] = updated;
                        lastHand = newBase;
                        handCount = 1;
                    }
                } else if (sticking === "K" || sticking === "") {
                    // 手を使わない打撃または休符で手の連続カウントをリセット
                    handCount = 0;
                    lastHand = "";
                }

                // --- Kick Guard (足) ---
                if (hasKick) {
                    kickCount++;
                    if (kickCount > 2) {
                        // 3連打目のキックを削除し、スネアのゴーストに変更してリズムを補完
                        let updatedSticking = sticking.replace("+K", "").replace("K", "");
                        
                        // もともとキック専用音（F）だった場合
                        if (fullPhrase[i][0] === "F" || fullPhrase[i][0] === "f") {
                            fullPhrase[i][0] = "c"; // スネアに変更
                            // 手順を補完（直前の手と逆にする）
                            let nextHand = (lastHand === "R") ? "l" : "r";
                            fullPhrase[i][1] = nextHand;
                            lastHand = nextHand.toUpperCase();
                            handCount = 1;
                        } else {
                            // スネア+キックなどだった場合はキックの文字だけ消す
                            fullPhrase[i][1] = updatedSticking;
                        }
                        kickCount = 0; // リセット
                    }
                } else {
                    kickCount = 0;
                }
            }
            return fullPhrase;
        }

        function slotToNotesAndWords(slot) {
            let notes = "";
            let wordsArr = [];
            const processNote = (s, is16th = false, is32nd = false) => {
                let [note, sticking, dyn, duration] = s;
                if (note.includes("z")) return note + (duration || (is16th ? "/" : is32nd ? "//" : ""));
                let prefix = (dyn === 'A') ? "!ff!!>!" : (dyn === 'G' ? "!ppp!" : "!f!");
                if (sticking) wordsArr.push(sticking);
                let suffix = duration || (is16th ? "/" : "");
                return prefix + note + suffix;
            };
            if (slot.length === 1) notes = processNote(slot[0]);
            else if (slot[0].length === 4) notes = slot.map(s => processNote(s)).join("");
            else if (slot.length === 6) notes = "(6" + slot.map(s => processNote(s, true)).join("");
            else if (slot.length === 3) notes = "(3" + slot.map(s => processNote(s, false)).join("");
            else if (slot.length === 2 || slot.length === 4) notes = slot.map(s => processNote(s, slot.length === 4)).join("");
            else notes = "z2";
            return { notes, words: wordsArr.join(" ") };
        }

        function skeletonToAbc(skeleton, difficulty, feel, isTradeMode) {
            if (!skeleton) return "";
            let flatPhrase = [];
            for (let bar = 0; bar < 4; bar++) {
                for (let beat = 0; beat < 4; beat++) {
                    const { key, isCrash, variationIndex } = skeleton[bar][beat];
                    const feelConfig = MOTIF_LIBRARY[feel];
                    let keyToUse = key;
                    if (difficulty === 'extreme' && feel === 'straight' && key === 'rest') {
                        let nextBar = bar, nextBeat = beat + 1;
                        if (nextBeat > 3) { nextBar++; nextBeat = 0; }
                        const nextIsAccent = nextBar < 4 && skeleton[nextBar][nextBeat].key !== 'rest';
                        if (variationIndex % 20 === 0) keyToUse = 'glitch_triplet';
                        else if (nextIsAccent) keyToUse = 'glitch_lead';
                        else keyToUse = 'glitch_fill';
                    }
                    const keyConfig = feelConfig[keyToUse] || feelConfig['rest'];
                    let targetDiff = (feel === 'swing' && difficulty === 'extreme') ? 'advanced' : difficulty;
                    const motifOptions = keyConfig[targetDiff] || keyConfig['extreme'] || keyConfig['basic'];
                    let motifDef = motifOptions[variationIndex % motifOptions.length];
                    if (motifDef.some(s => s[0] === 'e' || s[0] === 'A') && (variationIndex % 10 >= 4)) {
                        motifDef = keyConfig['basic'][variationIndex % keyConfig['basic'].length];
                    }
                    let motif = JSON.parse(JSON.stringify(motifDef));
                    if (difficulty !== 'basic' && isCrash) {
                        for (let i = 0; i < motif.length; i++) {
                            if (motif[i][2] === 'A') {
                                motif[i][0] = "[!style=x!fF]";
                                motif[i][1] = (motif[i][1] || "R") + "+K";
                                break;
                            }
                        }
                    }
                    flatPhrase.push({ motif, isBarEnd: (beat === 3) });
                }
            }
            let allSteps = [];
            flatPhrase.forEach(m => allSteps.push(...m.motif));
            applyStickingGuard(allSteps);
            let notesStr = "";
            let wordsStr = "w: ";
            let stepIdx = 0;
            flatPhrase.forEach(m => {
                let motifToProcess = [];
                for(let i=0; i<m.motif.length; i++) motifToProcess.push(allSteps[stepIdx++]);
                let { notes, words } = slotToNotesAndWords(motifToProcess);
                notesStr += notes + " ";
                if (words) wordsStr += words + " ";
                if (m.isBarEnd) { notesStr += "| "; wordsStr += "| "; }
            });
            if (isTradeMode) {
                notesStr = notesStr.slice(0, -2) + "\nz2 z2 z2 z2 | z2 z2 z2 z2 | z2 z2 z2 z2 | z2 z2 z2 z2 |] ";
                wordsStr += "\n | | | |";
            } else notesStr = notesStr.slice(0, -2) + "|] ";
            return notesStr + "\n" + wordsStr;
        }

        const App = () => {
            const [difficulty, setDifficulty] = useState('basic');
            const [feel, setFeel] = useState('straight');
            const [isTradeMode, setIsTradeMode] = useState(false);
            const [skeleton, setSkeleton] = useState(null);
            const [abcString, setAbcString] = useState("");
            const [visualObj, setVisualObj] = useState(null);
            const scoreRef = useRef(null);
            const audioContainerRef = useRef(null);
            const unlockAudio = async () => {
                const context = ABCJS.synth.activeAudioContext();
                if (context && context.state === 'suspended') await context.resume();
            };
            useEffect(() => {
                generateNewSkeleton();
                if (feel === 'swing' && difficulty === 'extreme') setDifficulty('advanced');
            }, [feel]);
            const generateNewSkeleton = () => {
                unlockAudio();
                const keys = Object.keys(MOTIF_LIBRARY[feel]).filter(k => k.startsWith('acc') || k === 'rest');
                const weightedKeys = [];
                keys.forEach(k => k === 'rest' ? weightedKeys.push(k, k) : weightedKeys.push(k, k, k));
                let newSkeleton = [];
                for (let bar = 0; bar < 4; bar++) {
                    let barSkeleton = [];
                    for (let beat = 0; beat < 4; beat++) {
                        let key = weightedKeys[Math.floor(Math.random() * weightedKeys.length)];
                        let isCrash = (beat === 0 && key !== 'rest') ? (bar === 0 ? 0.8 : 0.4) : 0;
                        barSkeleton.push({ key, isCrash: Math.random() < isCrash, variationIndex: Math.floor(Math.random() * 100) });
                    }
                    newSkeleton.push(barSkeleton);
                }
                setSkeleton(newSkeleton);
            };
            useEffect(() => {
                if (skeleton) {
                    const body = skeletonToAbc(skeleton, difficulty, feel, isTradeMode);
                    if (body) {
                        setAbcString(`X:1\nT:D.R.O.P. Solo Etude\nM:4/4\nL:1/8\nQ:1/4=90\nK:perc\n%%MIDI channel 10\n%%MIDI drummap f 49\n%%MIDI drummap e 45\n%%MIDI drummap c 38\n%%MIDI drummap A 43\n%%MIDI drummap F 36\n%%stretchlast 1\n%%vocalfont sans-serif 16\n%%stafflines 5\n` + body);
                    }
                }
            }, [skeleton, difficulty, feel, isTradeMode]);
            useEffect(() => {
                if (abcString && scoreRef.current) {
                    const rendered = ABCJS.renderAbc(scoreRef.current, abcString, { responsive: 'resize', add_classes: true, staffwidth: 900, scale: 1.3, paddingtop: 15, paddingbottom: 40 });
                    setVisualObj(rendered[0]);
                }
            }, [abcString]);
            useEffect(() => {
                if (visualObj && ABCJS.synth.supportsAudio() && audioContainerRef.current) {
                    audioContainerRef.current.innerHTML = "";
                    const controller = new ABCJS.synth.SynthController();
                    controller.load(audioContainerRef.current, null, { displayLoop: true, displayRestart: true, displayPlay: true, displayProgress: true, displayWarp: true });
                    controller.disable(true);
                    new ABCJS.synth.CreateSynth().init({ visualObj: visualObj }).then(() => {
                        controller.setTune(visualObj, false, { chordsOff: true, midiChannel: 10 });
                    }).catch(console.error);
                }
            }, [visualObj]);
            return (
                <div className="max-w-4xl mx-auto bg-white rounded-xl shadow-lg p-3 md:p-6 mt-2 md:mt-4">
                    <div className="text-center mb-4 md:mb-6"><h1 className="text-2xl md:text-3xl font-bold text-zinc-800">D.R.O.P. Solo Etude</h1></div>
                    <div className="flex flex-col gap-4 mb-6 bg-zinc-50 p-3 md:p-4 rounded-lg border border-zinc-200">
                        <div className="flex flex-wrap justify-center gap-3">
                            <div className="flex bg-white rounded-md border border-zinc-300 overflow-hidden shadow-sm">
                                <button onClick={() => { unlockAudio(); setFeel('straight'); }} className={`px-4 py-2 text-sm font-medium transition-colors ${feel === 'straight' ? 'bg-indigo-600 text-white' : 'hover:bg-zinc-100 text-zinc-700'}`}>Straight</button>
                                <button onClick={() => { unlockAudio(); setFeel('swing'); }} className={`px-4 py-2 text-sm font-medium transition-colors ${feel === 'swing' ? 'bg-indigo-600 text-white' : 'hover:bg-zinc-100 text-zinc-700'}`}>Swing</button>
                            </div>
                            <div className="flex bg-white rounded-md border border-zinc-300 overflow-hidden shadow-sm">
                                <button onClick={() => { unlockAudio(); setDifficulty('basic'); }} className={`px-3 md:px-4 py-2 text-xs md:text-sm font-medium transition-colors ${difficulty === 'basic' ? 'bg-indigo-600 text-white' : 'hover:bg-zinc-100 text-zinc-700'}`}>1. Basic</button>
                                <button onClick={() => { unlockAudio(); setDifficulty('advanced'); }} className={`px-3 md:px-4 py-2 text-xs md:text-sm font-medium transition-colors ${difficulty === 'advanced' ? 'bg-indigo-600 text-white' : 'hover:bg-zinc-100 text-zinc-700'}`}>2. Orchestration</button>
                                {feel === 'straight' && <button onClick={() => { unlockAudio(); setDifficulty('extreme'); }} className={`px-3 md:px-4 py-2 text-xs md:text-sm font-medium transition-colors ${difficulty === 'extreme' ? 'bg-indigo-600 text-white' : 'hover:bg-zinc-100 text-zinc-700'}`}>3. Extreme (Glitch)</button>}
                            </div>
                        </div>
                        <div className="flex flex-wrap justify-center gap-3 items-center">
                            <label className="flex items-center space-x-2 cursor-pointer bg-white px-4 py-2 rounded-md border border-zinc-300 shadow-sm hover:bg-zinc-50 transition-colors">
                                <input type="checkbox" checked={isTradeMode} onChange={(e) => setIsTradeMode(e.target.checked)} className="w-4 h-4 text-indigo-600 rounded focus:ring-indigo-500" />
                                <span className="text-xs md:text-sm font-medium text-zinc-700">🎧 4-Bar Trade</span>
                            </label>
                            <button onClick={generateNewSkeleton} className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-6 rounded-md shadow-sm transition-colors text-sm">🔄 New Phrasing</button>
                        </div>
                    </div>
                    <div className="bg-white border-2 border-zinc-100 rounded-lg p-2 md:p-4 overflow-x-auto min-h-[150px]"><div ref={scoreRef}></div></div>
                    <div className="mt-4 bg-slate-200 border border-slate-300 rounded-lg p-2 w-full max-w-2xl mx-auto shadow-inner"><div ref={audioContainerRef} className="w-full"></div></div>
                    <div className="mt-6 grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div className="bg-indigo-50 border border-indigo-100 rounded-lg p-4">
                            <h3 className="font-bold text-indigo-900 mb-2 border-b border-indigo-200 pb-1 text-sm">💡 改良された Sticking ロジック</h3>
                            <p className="text-xs text-indigo-800">
                                <strong>「連打は2回まで」:</strong> 手（R/L）だけでなく、<strong>足（K）も3連打以上にならないよう</strong>制御を追加しました。キックが3回続きそうな箇所は、システムが自動的にスネアのゴーストノートに置き換えて演奏性を確保します。
                            </p>
                        </div>
                        <div className="bg-zinc-50 border border-zinc-200 rounded-lg p-4">
                            <h3 className="font-bold text-zinc-800 mb-2 border-b border-indigo-200 pb-1 text-sm">🥁 手順の読み方</h3>
                            <ul className="text-xs text-zinc-600 space-y-1 font-mono bg-white p-2 rounded">
                                <li><strong>R / L / K :</strong> アクセント (強)</li>
                                <li><strong>r / l :</strong> ゴーストノート (弱)</li>
                            </ul>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
